name: Clawhaven CI

on:
  workflow_dispatch:
    inputs:
      full_test:
        description: Run full upstream pnpm test suite
        required: false
        default: "false"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: false
          persist-credentials: false
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check
        run: pnpm check

      - name: ClawHaven targeted tests
        run: |
          pnpm test \
            src/gateway/server-methods/agents-mutate.test.ts \
            src/gateway/server.node-invoke-approval-bypass.test.ts \
            test/scripts/package-acceptance-workflow.test.ts \
            test/scripts/openclaw-cross-os-release-workflow.test.ts \
            extensions/bluebubbles

      - name: Full upstream tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_test == 'true' }}
        run: pnpm test
